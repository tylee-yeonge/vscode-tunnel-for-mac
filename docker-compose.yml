services:
  vscode-tunnel:
    build: .
    container_name: vscode-tunnel
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TUNNEL_NAME=${TUNNEL_NAME}
      # HTTPS 방식 사용 시 GitHub Personal Access Token
      # - GIT_TOKEN=ghp_xxxxxxxxxxxx
    healthcheck:
      test: ["CMD", "code", "tunnel", "status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      # 작업 디렉토리 마운트
      - ${WORKSPACE_PATH}:/workspace

      # git config 공유 (호스트의 .gitconfig 재활용)
      - ~/.gitconfig:/root/.gitconfig:ro

      # SSH 키 공유 (git push용, SSH 방식 사용 시)
      - ~/.ssh:/root/.ssh:ro

      # VS Code tunnel 인증 상태 유지 (재시작 시 재로그인 방지)
      - vscode-cli-data:/root/.vscode-cli

      # Claude Code 인증 정보 공유 (호스트에서 로그인한 세션 재활용)
      - ~/.claude:/root/.claude

      # Codex 인증 정보 공유 (호스트에서 로그인한 세션 재활용)
      - ~/.codex:/root/.codex

volumes:
  vscode-cli-data:
